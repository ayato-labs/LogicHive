name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          uv pip install .
          uv pip install pyinstaller

      - name: Build EXE
        run: |
          uv run pyinstaller --onefile --name LogicHive-MCP --paths src src/mcp_server.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LogicHive-MCP.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
