name: Build and Release EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        id: pytest
        run: |
          uv run pytest tests/ > test_output.txt 2>&1 && python -c "print('Pass')" > status.txt || python -c "print('Fail')" > status.txt
        continue-on-error: true

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            status.txt
            test_output.txt
          retention-days: 1

  report:
    name: Generate Compatibility Report
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: result-*
          merge-multiple: false

      - name: Generate COMPATIBILITY.md
        shell: python
        run: |
          import os
          import glob
          from datetime import datetime

          results_dir = "results"
          report_file = "COMPATIBILITY.md"
          
          # Matrix definition
          python_versions = ["3.9", "3.10", "3.11", "3.12"]
          oss = ["ubuntu-latest", "windows-latest", "macos-latest"]
          
          # Initialize table data
          table_data = {} # (os, version) -> status
          
          for artifact_dir in glob.glob(os.path.join(results_dir, "result-*")):
              # dirname is results/result-ubuntu-latest-3.9
              parts = os.path.basename(artifact_dir).split("-")
              # Parts might be ['result', 'ubuntu', 'latest', '3.9'] or ['result', 'macos', 'latest', '3.9']
              # Recover OS and Python
              py_ver = parts[-1]
              os_name = "-".join(parts[1:-1])
              
              status_path = os.path.join(artifact_dir, "status.txt")
              if os.path.exists(status_path):
                  with open(status_path, "r") as f:
                      status = f.read().strip()
                  table_data[(os_name, py_ver)] = "✅ Pass" if status == "Pass" else "❌ Fail"
          
          # Generate Markdown
          now = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          md = f"# LogicHive Compatibility Registry\n\nLast Updated: {now}\n\n"
          md += "| OS | Python 3.9 | Python 3.10 | Python 3.11 | Python 3.12 |\n"
          md += "|:---|:---:|:---:|:---:|:---:|\n"
          
          for os_name in oss:
              row = f"| **{os_name}** | "
              cells = []
              for py_ver in python_versions:
                  cells.append(table_data.get((os_name, py_ver), "❓ N/A"))
              md += row + " | ".join(cells) + " |\n"
          
          md += "\n*This report is automatically generated by GitHub Actions.*\n"
          
          with open(report_file, "w") as f:
              f.write(md)
          
          print(f"Generated {report_file}")

      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add COMPATIBILITY.md
          git commit -m "docs: update compatibility registry [skip ci]" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Build and Release EXE
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Build EXE
        run: |
          uv run pyinstaller --noconfirm LogicHive.spec

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LogicHive-MCP.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
